name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test:
    name: Python
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3

      - name: Install dependencies
        run: mise run setup

      - name: Lint & Check
        run: mise run check

      - name: Run tests
        run: mise run test
        env:
          AWS_DEFAULT_REGION: us-east-1

  tofu:
    name: OpenTofu
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Read OpenTofu version
        run: echo "TOFU_VERSION=$(cut -d' ' -f2 terraform/.tool-versions)" >> $GITHUB_ENV

      - uses: Scalr/scalr-action@33132605fdcdd67e7cf8eaa0524fb7145c37e7b1 #v1
        with:
          scalr_hostname: mbta.scalr.io
          scalr_token: ${{ secrets.SCALR_TOKEN }}
          iac_platform: tofu
          binary_version: ${{ env.TOFU_VERSION }}
          binary_output: true

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Tofu init
        run: |
          cd terraform
          tofu init -backend=false

      - name: Tofu format and validate (module)
        uses: mbta/actions/check-tofu@6cff1d5eef7e0d780190353278bc84fdf6177dab # v2
        with:
          directories: "terraform"

      - name: Tofu test (module)
        run: |
          tofu -chdir=terraform test -var="aws_region=us-east-1" -var="context={}" -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}"

      - name: Tofu format and validate (example)
        uses: mbta/actions/check-tofu@6cff1d5eef7e0d780190353278bc84fdf6177dab # v2
        with:
          directories: "terraform/example"

  build:
    name: Build & Commit Zip
    needs: [test, tofu]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # zizmor: ignore[artipacked]

      - name: Install mise
        uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3

      - name: Build Zip
        run: |
          uv lock -P gtfs-rt-alerts-translation-lambda
          mise run build

      - name: Commit and Push Zip
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet function.zip; then
            echo "No changes in function.zip to commit"
          else
            git add -f function.zip uv.lock
            git commit -m "chore: update function.zip [skip ci]"
            git push
          fi
